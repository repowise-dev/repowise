# ---------------------------------------------------------------------------
# repowise-core — per-package config (packaging is handled by root pyproject.toml)
# ---------------------------------------------------------------------------
[project]
name = "repowise-core"
version = "0.1.2"
requires-python = ">=3.11"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/repowise"]

[tool.uv]
package = true
