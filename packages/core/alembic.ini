# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# The URL is overridden at runtime via the DATABASE_URL environment variable
# or by the CLI / server startup code.  This fallback is for local development.
sqlalchemy.url = sqlite+aiosqlite:///.repowise/wiki.db

# template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

# version path separator; As mentioned above, this is the character used to split
# version_locations. The default within new alembic.ini files is "os", which uses
# os.pathsep. If this key is omitted entirely, it falls back to the legacy
# behavior of splitting on spaces and/or commas.
# version_path_separator = os  # Use os.pathsep. Default configuration used for new projects.
# version_path_separator = ;   # use semicolon as separator
# version_path_separator = ,   # use comma as separator
version_path_separator = os

# set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate
# revision_environment = false

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
