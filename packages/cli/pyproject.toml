# ---------------------------------------------------------------------------
# repowise-cli — per-package config (packaging is handled by root pyproject.toml)
# ---------------------------------------------------------------------------
[project]
name = "repowise-cli"
version = "0.1.2"
requires-python = ">=3.11"
dependencies = ["repowise-core", "repowise-server"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/repowise"]

[tool.uv]
package = true

[tool.uv.sources]
repowise-core = { workspace = true }
repowise-server = { workspace = true }
