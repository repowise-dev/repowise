# KG validation matrix — every repo pinned to a commit so baselines and
# regressions are reproducible. Clones live under /tmp/kg-validate (override
# with KG_VALIDATE_DIR). `source` is a git URL or a local path to clone from.
#
# tier: import-support tier of the dominant language (1 = full resolver +
# validated, 2 = resolver never live-validated, 3 = passthrough).

